apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lyrion
spec:
  interval: 30m
  dependsOn:
    - name: smb-csi-driver
      namespace: kube-system
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            homeserver.richcorless.io/node-tier: untrusted
          tolerations:
            - key: homeserver.richcorless.io/untrusted
              operator: Equal
              value: "true"
              effect: NoSchedule
        containers:
          main:
            image:
              repository: lmscommunity/lyrionmusicserver
              tag: stable
    service:
      main:
        controller: main
        ports:
          http:
            port: 9000
            targetPort: 9000
          slimproto:
            port: 3483
            targetPort: 3483
            protocol: TCP
      slimproto-udp:
        controller: main
        ports:
          slimproto-udp:
            port: 3483
            targetPort: 3483
            protocol: UDP
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: lyrion-config
        globalMounts:
          - path: /config
      music:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: music
        globalMounts:
          - path: /music
      music-lossless:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: music-lossless
        globalMounts:
          - path: /music-lossless
