apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  settings.yaml: |
    title: Homeserver
    description: Homelab services
    target: _self
    statusStyle: dot
    layout:
      Media:
        style: row
        columns: 2
  services.yaml: |
    - Media:
        - Audiobookshelf:
            icon: audiobookshelf.png
            href: /audiobookshelf
            description: Audiobooks and podcasts
            siteMonitor: http://audiobookshelf.media.svc.cluster.local/audiobookshelf
            widget:
              type: audiobookshelf
              url: http://audiobookshelf.media.svc.cluster.local/audiobookshelf
              key: "{{HOMEPAGE_VAR_AUDIOBOOKSHELF_API_KEY}}"
              fields: ["books", "podcasts"]
        - Lyrion Music Server:
            icon: lyrion.svg
            href: http://{{HOMEPAGE_VAR_HOST_IP}}:9000
            description: Music library and streaming
            siteMonitor: http://lyrion-main.media.svc.cluster.local:9000
            widget:
              type: lms
              url: http://lyrion-main.media.svc.cluster.local:9000
              fields: ["players", "albums", "artists", "songs"]
  bookmarks.yaml: |
    []
  widgets.yaml: |
    - resources:
        expanded: true
        cpu: true
        memory: true
        disk: /
        network: true
