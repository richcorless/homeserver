apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
spec:
  interval: 30m
  dependsOn:
    - name: smb-csi-driver
      namespace: kube-system
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            homeserver.richcorless.io/node-tier: trusted
        containers:
          main:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.29.0
            env:
              BASE_URL: /audiobookshelf
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
            targetPort: 80
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: audiobookshelf-config
        globalMounts:
          - path: /config
      audiobooks:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: audiobooks
        globalMounts:
          - path: /audiobooks
