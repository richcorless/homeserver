apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
spec:
  interval: 30m
  chart:
    spec:
      chart: volsync
      # Check https://github.com/backube/volsync/releases for the latest version.
      version: "0.10.0"
      sourceRef:
        kind: HelmRepository
        name: volsync
        namespace: flux-system
